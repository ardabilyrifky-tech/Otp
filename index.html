<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPAM OTP | Professional Tools</title>
    <style>
        :root {
            --primary-bg: #0a0a0a;
            --secondary-bg: #111111;
            --card-bg: rgba(20, 20, 20, 0.9);
            --accent-color: #ffffff;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: rgba(255, 255, 255, 0.1);
            --success-color: #ffffff;
            --error-color: #ffffff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-primary);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* TV ERROR BACKGROUND EFFECTS */
        .tv-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        /* Static Noise */
        .static-noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 0, 0, 0.15) 0px,
                    rgba(0, 0, 0, 0.15) 1px,
                    transparent 1px,
                    transparent 2px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(0, 0, 0, 0.1) 0px,
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 2px
                );
            opacity: 0.3;
            animation: staticMove 0.1s infinite;
        }

        /* Scan Lines */
        .scan-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px;
            animation: scanMove 0.2s linear infinite;
        }

        /* Glitch Effect */
        .glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, #ff0000 0%, #00ff00 50%, #0000ff 100%);
            mix-blend-mode: overlay;
            opacity: 0.05;
            animation: glitch 2s infinite;
        }

        /* Color Bars Distortion */
        .color-bars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                #ff0000 0%,
                #ff0000 16.666%,
                #ffff00 16.666%,
                #ffff00 33.333%,
                #00ff00 33.333%,
                #00ff00 50%,
                #00ffff 50%,
                #00ffff 66.666%,
                #0000ff 66.666%,
                #0000ff 83.333%,
                #ff00ff 83.333%,
                #ff00ff 100%
            );
            opacity: 0;
            animation: colorFlash 5s infinite;
            mix-blend-mode: overlay;
        }

        /* Screen Flicker */
        .screen-flicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            animation: screenFlicker 8s infinite;
        }

        /* Horizontal Lines Distortion */
        .horizontal-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(255, 255, 255, 0.02) 3px,
                rgba(255, 255, 255, 0.02) 4px
            );
            animation: horizontalDistort 3s infinite;
        }

        /* Vertical Jitter */
        .vertical-jitter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            animation: verticalJitter 0.5s infinite;
        }

        /* Signal Loss */
        .signal-loss {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at 50% 50%,
                transparent 30%,
                rgba(0, 0, 0, 0.8) 70%
            );
            opacity: 0;
            animation: signalLoss 12s infinite;
        }

        /* Brutal Distortion */
        .brutal-distortion {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                conic-gradient(
                    from 0deg at 50% 50%,
                    #ff0000,
                    #00ff00,
                    #0000ff,
                    #ff0000
                );
            mix-blend-mode: difference;
            opacity: 0;
            animation: brutalDistort 7s infinite;
            filter: blur(10px);
        }

        /* ANIMATIONS */
        @keyframes staticMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(10px, 10px); }
        }

        @keyframes scanMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        @keyframes glitch {
            0% { transform: translateX(0); opacity: 0.05; }
            25% { transform: translateX(-5px); opacity: 0.1; }
            50% { transform: translateX(5px); opacity: 0.05; }
            75% { transform: translateX(-3px); opacity: 0.08; }
            100% { transform: translateX(0); opacity: 0.05; }
        }

        @keyframes colorFlash {
            0%, 85% { opacity: 0; }
            86% { opacity: 0.3; }
            87% { opacity: 0; }
            88% { opacity: 0.4; }
            89% { opacity: 0; }
            90% { opacity: 0.2; }
            91% { opacity: 0; }
            92% { opacity: 0.5; }
            93% { opacity: 0; }
            100% { opacity: 0; }
        }

        @keyframes screenFlicker {
            0%, 92%, 94%, 96%, 98%, 100% { opacity: 0; }
            93%, 95%, 97%, 99% { opacity: 0.1; }
        }

        @keyframes horizontalDistort {
            0%, 90% { transform: scaleY(1); }
            91% { transform: scaleY(0.8); }
            92% { transform: scaleY(1.2); }
            93% { transform: scaleY(0.9); }
            94% { transform: scaleY(1.1); }
            95% { transform: scaleY(1); }
        }

        @keyframes verticalJitter {
            0%, 80% { transform: translateX(0); }
            81% { transform: translateX(-2px); }
            82% { transform: translateX(2px); }
            83% { transform: translateX(-1px); }
            84% { transform: translateX(1px); }
            85% { transform: translateX(0); }
        }

        @keyframes signalLoss {
            0%, 88% { opacity: 0; }
            89% { opacity: 0.6; }
            90% { opacity: 0; }
            91% { opacity: 0.8; }
            92% { opacity: 0; }
            93% { opacity: 0.4; }
            94% { opacity: 0; }
            100% { opacity: 0; }
        }

        @keyframes brutalDistort {
            0%, 93% { opacity: 0; transform: scale(1) rotate(0deg); }
            94% { opacity: 0.3; transform: scale(1.1) rotate(5deg); }
            95% { opacity: 0.2; transform: scale(0.9) rotate(-5deg); }
            96% { opacity: 0.4; transform: scale(1.2) rotate(10deg); }
            97% { opacity: 0.1; transform: scale(0.8) rotate(-10deg); }
            98% { opacity: 0.5; transform: scale(1.3) rotate(15deg); }
            99% { opacity: 0; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; }
        }

        /* MAIN LAYOUT STYLES */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            color: var(--primary-bg);
        }

        .brand-text h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px red;
        }

        .brand-text p {
            color: #aaa;
            font-size: 14px;
        }

        .music-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .music-btn {
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.25s ease;
        }

        .music-btn:hover {
            background: #343434;
            transform: scale(1.06);
        }

        .music-status {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        #musicText {
            font-size: 15px;
            font-weight: 500;
            color: #e5e5e5;
            font-family: "Poppins", sans-serif;
        }

        #musicState {
            font-size: 12px;
            font-weight: bold;
            margin-top: 2px;
            font-family: "Poppins", sans-serif;
        }

        #musicState.on {
            color: #17ff45;
            text-shadow: 0 0 6px #17ff45;
        }

        #musicState.off {
            color: #ff2b2b;
            text-shadow: 0 0 6px #ff2b2b;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .phone-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 16px;
            transition: var(--transition);
        }

        .phone-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
        }

        .phone-input::placeholder {
            color: var(--text-secondary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-3px);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #b0b0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .control-panel {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }

        .btn {
            padding: 16px 28px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.9);
            color: #000;
        }

        .btn-primary:hover:not(:disabled) {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.1);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
            transition: var(--transition);
        }

        .status-dot.active {
            background: var(--success-color);
            box-shadow: 0 0 10px var(--success-color);
        }

        .status-text {
            font-size: 14px;
            font-weight: 500;
        }

        .log-container {
            margin-top: 30px;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .log-actions {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            border-radius: 8px;
        }

        #log {
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            padding: 20px;
            border-radius: 12px;
            height: 300px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid var(--border-color);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .log-entry {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .log-time {
            color: var(--text-secondary);
            font-size: 12px;
            min-width: 80px;
        }

        .log-message {
            flex: 1;
        }

        .log-success { color: var(--success-color); }
        .log-error { color: var(--error-color); opacity: 0.7; }
        .log-info { color: var(--text-primary); }
        .log-warning { color: var(--text-primary); font-weight: 500; }

        .footer {
            text-align: center;
            padding: 30px 0;
            margin-top: 50px;
            border-top: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .social-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 1024px) {
            .dashboard {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .container {
                padding: 15px;
            }
        }

        @media (max-width: 768px) {
            .main-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .control-panel {
                flex-direction: column;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
